$activeBorderColor = rgba(33ccffee) rgba(00ff99ee) 45deg
$inactiveBorderColor = rgba(595959aa)

general {
  gaps_in = 5
  gaps_out = 10
  border_size = 2
  col.active_border = $activeBorderColor
  col.inactive_border = $inactiveBorderColor
  resize_on_border = false
  allow_tearing = false
  layout = dwindle
}

decoration {
  rounding = 0
  shadow {
    enabled = true
    range = 2
    render_power = 3
    color = rgba(1a1a1aee)
  }
  blur {
    enabled = true
    size = 2
    passes = 2
    special = true
    brightness = 0.60
    contrast = 0.75
  }
}

animations {
  enabled = yes
  bezier = easeOutQuint,0.23,1,0.32,1
  animation = windows, 1, 4.79, easeOutQuint
  animation = fade, 1, 3.03, easeOutQuint
  animation = workspaces, 1, 3.03, easeOutQuint
}

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
}
