# Application launchers
$mod = SUPER
bind = $mod, RETURN, exec, alacritty
bind = $mod, SPACE, exec, wofi --show drun --prompt "Search"
bind = $mod SHIFT, SPACE, exec, wofi --show run --prompt "Run"

# Session controls
bind = $mod, Q, killactive
bind = $mod SHIFT, E, exit
bind = $mod CTRL, R, exec, hyprctl reload
bind = $mod, F, fullscreen, 0
bind = $mod, V, togglefloating

# Focus movement
bind = $mod, LEFT, movefocus, l
bind = $mod, RIGHT, movefocus, r
bind = $mod, UP, movefocus, u
bind = $mod, DOWN, movefocus, d

# Workspace movement
bind = $mod, code:10, workspace, 1
bind = $mod, code:11, workspace, 2
bind = $mod, code:12, workspace, 3
bind = $mod, code:13, workspace, 4
bind = $mod, code:14, workspace, 5
bind = $mod SHIFT, code:10, movetoworkspace, 1
bind = $mod SHIFT, code:11, movetoworkspace, 2
bind = $mod SHIFT, code:12, movetoworkspace, 3
bind = $mod SHIFT, code:13, movetoworkspace, 4
bind = $mod SHIFT, code:14, movetoworkspace, 5

# Lock and screenshots
bind = $mod CTRL, L, exec, swaylock -f
bind = , PRINT, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, PRINT, exec, sh -lc 'mkdir -p ~/Pictures/Screenshots && grim ~/Pictures/Screenshots/$(date +"%Y-%m-%d_%H-%M-%S").png'
