---
name: Build installer ISO

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: OCI image tag to build the installer from
        required: false
        default: stable
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-installer-iso:
    permissions:
      contents: read
      packages: read
      id-token: write
    uses: ./.github/workflows/reusable-build-iso.yml
    with:
      image_tag: ${{ inputs.image_tag }}
      checkout_ref: ${{ github.sha }}
      upload_artifacts: true
    secrets: inherit
